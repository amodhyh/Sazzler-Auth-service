
spring:
  application:
    name: sazzler-auth-service
  datasource:
    url: jdbc:postgresql://localhost:5433/sazzler_postgress_db
    username: amodhyh
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: "auth"
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - email
              - profile
          github:
            client-id: ${GITHUB_CLIENT_ID:your-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:your-github-client-secret}
            scope:
              - user:email
              - read:user

server:
  port: 8082
jwt:
  secret: 27f9bcfc4523599275abbb317f7117e8e864e7f31c2198c45df93f6c2d1a9ce7
  expiration: 3600000 # (1 hour)

# URI the OAuth success handler redirects to with ?token=<jwt>
oauth2:
  redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/callback}

eureka:
  instance:
    prefer-ip-address: true #register with IP address with the eureka server
  client:
    service-url:
        defaultZone: http://amodhyh:1234@localhost:8761/eureka/
logging:
  level:
    org:
        springframework:
            security: DEBUG
